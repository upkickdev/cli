name: Bug report
description: Report a reproducible problem in Upkick.
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Upkick. Please do not include secrets, access tokens, private repository contents, or personal data.

  - type: checkboxes
    id: existing
    attributes:
      label: Existing issue check
      options:
        - label: I searched the existing issues and did not find a duplicate.
          required: true

  - type: input
    id: version
    attributes:
      label: Upkick version
      description: Run `upkick --version`.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command
      description: Which command failed?
      placeholder: "upkick create my-app"
    validations:
      required: true

  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Run `node --version`.
      placeholder: "v24.x"
    validations:
      required: true

  - type: input
    id: package-manager
    attributes:
      label: Package manager and version
      placeholder: "pnpm 10.x"
    validations:
      required: false

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide the smallest set of steps that consistently reproduces the problem.
      placeholder: |
        1. Run ...
        2. Select ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove secrets, tokens, private URLs, and personal data before pasting.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Screenshots, sample repositories, or other useful context.
    validations:
      required: false

  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct.
          required: true
