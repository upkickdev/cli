name: Publish to npm

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Update npm for trusted publishing
        run: npm install --global npm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Check package version
        id: package
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --silent >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION will be published."
          fi

      - name: Publish package
        if: steps.package.outputs.should_publish == 'true'
        run: npm publish --access public

      - name: Skip existing version
        if: steps.package.outputs.should_publish == 'false'
        run: |
          echo "Skipping publish."
          echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} already exists on npm."
